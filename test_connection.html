<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>连接测试</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .result { margin: 20px 0; padding: 10px; border: 1px solid #ccc; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Supabase连接测试</h1>
    <div id="result" class="result"></div>
    
    <script>
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            
            try {
                // 测试Supabase SDK是否加载
                if (window.supabase) {
                    resultDiv.innerHTML += '<p>Supabase SDK加载成功</p>';
                } else {
                    resultDiv.innerHTML += '<p class="error">Supabase SDK加载失败</p>';
                    return;
                }
                
                // 测试Supabase连接
                const supabaseUrl = 'https://iwpnajbmceobbkvwqtmy.supabase.co';
                const supabaseKey = 'sb_publishable_-FWZBtjD8_JcgoaupQSq0w_2KCvd-FT';
                
                const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);
                resultDiv.innerHTML += '<p>Supabase客户端创建成功</p>';
                
                // 测试获取数据
                const { data, error } = await supabaseClient
                    .from('books')
                    .select('*')
                    .eq('is_deleted', false)
                    .limit(5);
                
                if (error) {
                    resultDiv.innerHTML += `<p class="error">获取数据失败: ${error.message}</p>`;
                } else {
                    resultDiv.innerHTML += `<p class="success">获取数据成功，返回 ${data.length} 条记录</p>`;
                    resultDiv.innerHTML += '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
                }
            } catch (error) {
                resultDiv.innerHTML += `<p class="error">测试失败: ${error.message}</p>`;
            }
        }
        
        // 页面加载时执行测试
        window.onload = testConnection;
    </script>
</body>
</html>
